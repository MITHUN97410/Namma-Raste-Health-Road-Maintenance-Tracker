<!DOCTYPE html>
<html>
<head>
    <title>My Live Website</title>

    <style>
        body{
            background-color:#f2f2f2;
            font-family:Arial;
            text-align:center;
            padding-top:100px;
        }

        h1{
            color:#333;
            font-size:50px;
        }

        p{
            font-size:25px;
            color:#666;
        }

        button{
            padding:15px 30px;
            font-size:20px;
            background-color:blue;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        button:hover{
            background-color:darkblue;
        }
    </style>
</head>

<body>

    <h1>Hello World 🚀</h1>

    <p>My website is live using GitHub Pages</p>

    <button onclick="showMessage()">
        Click Me
    </button>

    <script>
        function showMessage(){
            alert("Website Working Successfully!");
        }
    </script>

</body>
</html>
